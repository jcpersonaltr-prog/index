<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPERM INVADERS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;align-items:center;
     min-height:100vh;overflow:hidden;touch-action:none;}
#game{position:relative;width:600px;height:700px;overflow:hidden;
       border:3px solid #ff69b4;box-shadow:0 0 30px #ff69b4;}
#starCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;height:36px;
      display:none;justify-content:space-between;align-items:center;
      padding:0 10px;font-family:'Press Start 2P',monospace;font-size:9px;
      color:#ff69b4;background:rgba(0,0,0,0.8);z-index:100;border-bottom:1px solid #330022;}

/* Sprites via IMG tags — no canvas artefacts! */
.enemy{position:absolute;width:58px;height:58px;z-index:10;
        transition:none;image-rendering:auto;}
.enemy img{width:100%;height:100%;object-fit:contain;}
.enemy.flash img{filter:brightness(10) saturate(0);}

#player{position:absolute;z-index:20;transition:none;}
#player img{width:44px;height:auto;display:block;image-rendering:auto;
             transform-origin:bottom center;transition:height 0.1s;}

/* Bullets */
.bullet{position:absolute;z-index:15;pointer-events:none;}
.ebullet{position:absolute;width:14px;height:14px;border-radius:50%;
          background:radial-gradient(circle at 35% 35%,#ff99cc,#cc0066);z-index:15;}

/* Ink particles via canvas overlay */
#fxCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:16;pointer-events:none;}

/* INTRO */
#intro{position:absolute;inset:0;background:radial-gradient(ellipse,#1a0020,#000);
        display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
.ititle{font-family:'Bangers',cursive;font-size:68px;color:#fff;text-align:center;line-height:1;
         text-shadow:4px 4px 0 #ff1493,0 0 40px #ff69b4;letter-spacing:6px;
         animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.isub{font-family:'Bangers',cursive;font-size:26px;color:#ffdd00;letter-spacing:3px;margin:4px 0 12px;}
#introImg{width:110px;animation:bob 1.2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
.itag{font-size:8px;color:#ff69b4;text-align:center;margin:6px;line-height:1.9;font-family:'Press Start 2P',monospace;}
.ibtn{margin-top:10px;font-family:'Press Start 2P',monospace;font-size:12px;color:#000;
       background:linear-gradient(135deg,#ff69b4,#ff1493);border:none;padding:12px 28px;
       cursor:pointer;box-shadow:4px 4px 0 #880044;animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.ibadge{position:absolute;top:10px;right:10px;background:#ff1493;color:#fff;
         font-family:'Press Start 2P',monospace;font-size:7px;padding:5px 8px;
         border:2px solid #fff;text-align:center;line-height:1.9;}

/* GAME OVER */
#gameover{position:absolute;inset:0;background:rgba(0,0,0,0.9);
           display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
.gotitle{font-family:'Bangers',cursive;font-size:76px;color:#ff1493;
          text-shadow:4px 4px 0 #880044;letter-spacing:5px;}
.gomsg{font-family:'Press Start 2P',monospace;font-size:8px;color:#ffdd00;
        margin:14px;text-align:center;line-height:2.3;}

/* Level flash */
#levelFlash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
             z-index:50;pointer-events:none;opacity:0;}
#levelFlash span{font-family:'Press Start 2P',monospace;font-size:28px;color:#ff69b4;
                  text-shadow:0 0 20px #ff1493;}

/* Touch controls */
#touch{display:none;position:absolute;bottom:0;left:0;right:0;height:130px;z-index:150;pointer-events:none;}
#jzone{position:absolute;left:20px;bottom:18px;width:110px;height:110px;pointer-events:all;}
#jbase{position:absolute;inset:0;border-radius:50%;background:rgba(255,105,180,0.15);border:2px solid rgba(255,105,180,0.4);}
#jknob{position:absolute;width:46px;height:46px;border-radius:50%;
        background:radial-gradient(circle at 35% 35%,#ff99cc,#ff1493);border:2px solid #fff;
        top:50%;left:50%;transform:translate(-50%,-50%);}
#fbtn{position:absolute;right:20px;bottom:22px;width:88px;height:88px;border-radius:50%;
       background:radial-gradient(circle at 35% 30%,#ffe066,#ff8800);border:3px solid #fff;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       font-family:'Press Start 2P',monospace;font-size:7px;color:#000;line-height:1.6;
       pointer-events:all;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
@media(pointer:coarse){#touch{display:block;}}
</style>
</head>

// ── Star canvas ───────────────────────────────────────────────────────────────
const sc = document.getElementById('starCanvas');
sc.width=GW; sc.height=GH;
const sctx = sc.getContext('2d');
const STARS = Array.from({length:90},()=>({
  x:Math.random()*GW, y:Math.random()*GH, r:Math.random()*1.5+0.3, ph:Math.random()*Math.PI*2
}));
function drawStars(t) {
  sctx.clearRect(0,0,GW,GH);
  STARS.forEach(s=>{
    const a=80+80*Math.sin(t*2+s.ph);
    sctx.fillStyle=`rgba(${Math.round(a)},${Math.round(a)},${Math.round(a)},1)`;
    sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2); sctx.fill();
  });
}

let AC;
function ga(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }
function playShoot(){try{const a=ga(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type='sine';
  o.frequency.setValueAtTime(800,a.currentTime);
  o.frequency.exponentialRampToValueAtTime(200,a.currentTime+0.12);
  g.gain.setValueAtTime(0.3,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.12);
  o.start();o.stop(a.currentTime+0.12);}catch(e){}}
function playSplat(){try{const a=ga();
  const buf=a.createBuffer(1,a.sampleRate*0.25,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const src=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
  f.type='lowpass';f.frequency.value=900;src.buffer=buf;
  src.connect(f);f.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(0.6,a.currentTime);src.start();
  const o=a.createOscillator(),g2=a.createGain();
  o.connect(g2);g2.connect(a.destination);o.type='sine';
  o.frequency.setValueAtTime(300,a.currentTime);
  o.frequency.exponentialRampToValueAtTime(80,a.currentTime+0.3);
  g2.gain.setValueAtTime(0.4,a.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.3);
  o.start();o.stop(a.currentTime+0.3);}catch(e){}}
function playDeath(){try{const a=ga(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type='square';
  o.frequency.setValueAtTime(400,a.currentTime);
  o.frequency.exponentialRampToValueAtTime(40,a.currentTime+0.6);
  g.gain.setValueAtTime(0.4,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.6);
  o.start();o.stop(a.currentTime+0.6);}catch(e){}}

  ['C4',.10],['D4',.10],['E4',.10],['F4',.10],['G4',.10],['A4',.10],['Bb4',.10],['C5',.22],
  ['_',.10],['C5',.12],['B4',.12],['Bb4',.12],['A4',.12],['G4',.12],['F4',.12],['E4',.28],
  ['E4',.10],['G4',.10],['E4',.10],['G4',.10],['C5',.32],['_',.10],['C5',.16],['_',.12],
  ['G4',.12],['E4',.12],['C4',.12],['E4',.12],['G4',.12],['C5',.44],['_',.20]];
const BASS=[['C3',.3],['G3',.3],['C3',.3],['G3',.3],['A3',.3],['E3',.3],['A3',.3],['E3',.3],
            ['F3',.3],['C3',.3],['F3',.3],['C3',.3],['G3',.3],['D3',.3],['G3',.3],['D3',.3]];
const KP=[1,0,0,0,1,1,0,0],SP=[0,0,1,0,0,0,1,0];
function sn(a,f,type,t,d,v){if(!f)return;const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=type;o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.01);
  g.gain.setValueAtTime(v,t+d*0.7);g.gain.exponentialRampToValueAtTime(0.001,t+d*0.98);
  o.start(t);o.stop(t+d);musicNodes.push(o);}
function startMusic(){if(musicOn)return;musicOn=true;
  const a=ga();if(a.state==='suspended')a.resume();
  let mi=0,bi=0,di=0,mt=a.currentTime+0.05,bt=a.currentTime+0.05,dt=a.currentTime+0.05;
  function tick(){if(!musicOn)return;
    while(mt<a.currentTime+0.4){const[n,d]=MEL[mi++%MEL.length];sn(a,NOTE[n],'square',mt,d*.88,.14);mt+=d;}
    while(bt<a.currentTime+0.4){const[n,d]=BASS[bi++%BASS.length];sn(a,NOTE[n],'sawtooth',bt,d*.6,.09);bt+=d;}
    while(dt<a.currentTime+0.4){const idx=di++%KP.length;
      if(KP[idx]){const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
        o.type='sine';o.frequency.setValueAtTime(180,dt);o.frequency.exponentialRampToValueAtTime(40,dt+0.1);
        g.gain.setValueAtTime(0.45,dt);g.gain.exponentialRampToValueAtTime(0.001,dt+0.12);
        o.start(dt);o.stop(dt+0.13);musicNodes.push(o);}
      if(SP[idx]){try{const buf=a.createBuffer(1,a.sampleRate*.09,a.sampleRate),dd=buf.getChannelData(0);
        for(let i=0;i<dd.length;i++)dd[i]=(Math.random()*2-1)*Math.pow(1-i/dd.length,1.5);
        const src=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
        f.type='highpass';f.frequency.value=2000;src.buffer=buf;src.connect(f);f.connect(g);g.connect(a.destination);
        g.gain.setValueAtTime(0.3,dt);g.gain.exponentialRampToValueAtTime(0.001,dt+0.09);src.start(dt);
        musicNodes.push(src);}catch(e){}}
      dt+=0.15;}
    musicNodes=musicNodes.filter(n=>{try{return n.playbackState!==3;}catch(e){return false;}});
    musicTimer=setTimeout(tick,100);}tick();}
function stopMusic(){musicOn=false;if(musicTimer)clearTimeout(musicTimer);
  musicNodes.forEach(n=>{try{n.stop();}catch(e){}});musicNodes=[];}

// ── Particles on FX canvas ────────────────────────────────────────────────────
let particles=[];
function spawnInk(x,y){
  for(let i=0;i<28;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*9;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*4,
      r:4+Math.random()*9,life:1,decay:.022+Math.random()*0.04,
      splat:false,sr:(5+Math.random()*10)*1.8,
      col:`rgba(255,250,220,`,type:'ink'});}
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,
      r:3+Math.random()*7,life:1,decay:.04+Math.random()*0.05,
      col:['rgba(255,105,180,','rgba(255,20,147,','rgba(255,221,0,'][Math.floor(Math.random()*3)],
      type:'exp'});}
}
function updateParticles(){
  fctx.clearRect(0,0,GW,GH);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.vx*=0.93;p.vy+=0.4;p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.vy>0&&p.y>GH*0.9&&!p.splat)p.splat=true;
    if(p.life<=0){particles.splice(i,1);continue;}
    if(p.type==='ink'){
      const r=Math.max(1,p.splat?p.sr:p.r);
      fctx.fillStyle=p.col+p.life+')';
      fctx.beginPath();
      fctx.ellipse(p.x,p.y,r,p.splat?r*0.3:r,0,0,Math.PI*2);
      fctx.fill();
    }else{
      const r=Math.max(1,p.r*p.life);
      fctx.fillStyle=p.col+p.life+')';
      fctx.beginPath();fctx.arc(p.x,p.y,r,0,Math.PI*2);fctx.fill();
    }
  }
}

// ── Bullet rendering via DOM ──────────────────────────────────────────────────
function makeBullet(x,y){
  const el=document.createElement('div');
  el.className='bullet';
  el.style.cssText=`left:${x-8}px;top:${y}px;width:16px;height:24px;`;
  el.innerHTML=`<svg width="16" height="24" viewBox="0 0 16 24">
    <defs><radialGradient id="dg" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ddf4ff"/>
      <stop offset="100%" stop-color="rgba(100,180,255,0)"/>
    </radialGradient></defs>
    <ellipse cx="8" cy="10" rx="6" ry="10" fill="url(#dg)"/>
    <ellipse cx="6" cy="6" rx="2" ry="3" fill="rgba(255,255,255,0.7)"/>
    <ellipse cx="8" cy="21" rx="3" ry="2" fill="rgba(200,240,255,0.5)"/>
  </svg>`;
  game.appendChild(el);
  return {el,x,y:parseFloat(y)};
}

// ── Game state ────────────────────────────────────────────────────────────────
let state='intro',score=0,lives=3,level=1,gt=0,raf=null;
let px=300,erect=0,erTimer=0,pShootCd=0,pMoveDir=0;
let enemies=[],bullets=[],ebullets=[];
let eOX=30,eOY=55,eDir=1,eSpd=0.6,eShootT=0,lFlash=0;

function makeEnemyEl(){
  const el=document.createElement('div');
  el.className='enemy';
  const img=document.createElement('img');
  img.src=ASS_SRC; img.draggable=false;
  el.appendChild(img);
  game.appendChild(el);
  return el;
}

function initLevel(){
  // Remove old enemies
  document.querySelectorAll('.enemy').forEach(e=>e.remove());
  document.querySelectorAll('.bullet').forEach(e=>e.remove());
  document.querySelectorAll('.ebullet').forEach(e=>e.remove());
  enemies=[];bullets=[];ebullets=[];
  eOX=30;eOY=55;eDir=1;eSpd=0.6+level*0.2;eShootT=0;
  for(let r=0;r<4;r++) for(let c=0;c<7;c++){
    const el=makeEnemyEl();
    enemies.push({col:c,row:r,alive:true,animT:Math.random()*Math.PI*2,
                   flash:0,el,rx:0,ry:0});
  }
}

// ── Player DOM ────────────────────────────────────────────────────────────────
const playerEl=document.getElementById('player');
const penisImg=document.getElementById('penisImg');
function updatePlayerDOM(){
  const h=44+(78-44)*erect;
  const w=44;
  const wb=Math.sin(gt*5)*(1.5+erect*4)*erect;
  penisImg.style.height=h+'px';
  penisImg.style.width=w+'px';
  playerEl.style.left=(px-w/2+wb)+'px';
  playerEl.style.top=(GH-65-h)+'px';
  // Lean based on move direction
  const lean=pMoveDir*(5+erect*4);
  penisImg.style.transform=`rotate(${lean}deg)`;
}

// ── Touch ─────────────────────────────────────────────────────────────────────
const jzone=document.getElementById('jzone');
const jknob=document.getElementById('jknob');
const fbtn=document.getElementById('fbtn');
let jDX=0,jOn=false,fireHeld=false;
jzone.addEventListener('touchstart',e=>{e.preventDefault();jOn=true;jDX=0;},{passive:false});
jzone.addEventListener('touchmove',e=>{e.preventDefault();if(!jOn)return;
  const r=jzone.getBoundingClientRect(),cx=r.left+r.width/2;
  jDX=Math.max(-36,Math.min(36,e.touches[0].clientX-cx));
  jknob.style.transform=`translate(calc(-50% + ${jDX}px),-50%)`;
},{passive:false});
jzone.addEventListener('touchend',e=>{e.preventDefault();jOn=false;jDX=0;jknob.style.transform='translate(-50%,-50%)'; });
fbtn.addEventListener('touchstart',e=>{e.preventDefault();fireHeld=true;if(state==='intro')startGame();},{passive:false});
fbtn.addEventListener('touchend',e=>{e.preventDefault();fireHeld=false;});
fbtn.addEventListener('touchcancel',()=>fireHeld=false);

const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();
  if((e.key===' '||e.key==='Enter')&&state==='intro')startGame();});
document.addEventListener('keyup',e=>keys[e.key]=false);

// ── Start ─────────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('intro').style.display='none';
  document.getElementById('gameover').style.display='none';
  document.getElementById('hud').style.display='flex';
  if(window.matchMedia('(pointer:coarse)').matches)
    document.getElementById('touch').style.display='block';
  score=0;lives=3;level=1;px=300;erect=0;erTimer=0;
  document.getElementById('sc').textContent=0;
  document.getElementById('lv').textContent='♥♥♥';
  initLevel(); state='playing';
  stopMusic(); startMusic();
  if(raf)cancelAnimationFrame(raf);
  loop();
}
function gameOver(){
  state='gameover';stopMusic();
  document.getElementById('fs').textContent=score;
  document.getElementById('gameover').style.display='flex';
  if(raf)cancelAnimationFrame(raf);
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(){
  // Move player
  const ts=jOn?(Math.abs(jDX)/36)*1.5+0.3:1;
  pMoveDir=0;
  if((keys['ArrowLeft']||jDX<-8)&&px>30){px-=5*ts;pMoveDir=-1;}
  if((keys['ArrowRight']||jDX>8)&&px<GW-30){px+=5*ts;pMoveDir=1;}

  // Erect deflate
  if(erTimer>0)erTimer--;
  else erect=Math.max(0,erect-0.07);

  // Shoot
  pShootCd=Math.max(0,pShootCd-1);
  if((keys[' ']||fireHeld)&&pShootCd===0){
    const bh=44+(78-44)*erect;
    const by=GH-65-bh-8;
    bullets.push(makeBullet(px,by));
    erect=1;erTimer=14;pShootCd=16;playShoot();
  }

  // Move bullets
  for(let i=bullets.length-1;i>=0;i--){
    bullets[i].y-=11;
    bullets[i].el.style.top=bullets[i].y+'px';
    if(bullets[i].y<-30){bullets[i].el.remove();bullets.splice(i,1);}
  }

  // Move enemy bullets
  for(let i=ebullets.length-1;i>=0;i--){
    const b=ebullets[i];
    b.x+=b.vx;b.y+=b.vy;
    b.el.style.left=(b.x-7)+'px';b.el.style.top=(b.y-7)+'px';
    if(b.y>GH+20){b.el.remove();ebullets.splice(i,1);}
  }

  // Move enemies
  const alive=enemies.filter(e=>e.alive);
  if(!alive.length){level++;lFlash=2;initLevel();return;}

  // Update enemy positions & animate
  alive.forEach(e=>{
    e.animT+=0.04;
    const jx=Math.sin(e.animT*3)*2;
    const jy=Math.cos(e.animT*2.5)*1.5;
    e.rx=eOX+e.col*70+jx; e.ry=eOY+e.row*62+jy;
    e.el.style.left=e.rx+'px';
    e.el.style.top=e.ry+'px';
    if(e.flash>0){e.el.classList.add('flash');e.flash--;}
    else e.el.classList.remove('flash');
  });

  const xs=alive.map(e=>eOX+e.col*70);
  const mnx=Math.min(...xs),mxx=Math.max(...xs)+58;
  if((eDir===1&&mxx>=GW-8)||(eDir===-1&&mnx<=8)){
    eDir*=-1;eOY+=16;eSpd=Math.min(eSpd+0.1,4);
  }else{eOX+=eDir*eSpd;}

  // Enemy shoot
  eShootT++;
  if(eShootT>Math.max(25,90-level*12)){
    eShootT=0;
    const br=Math.max(...alive.map(e=>e.row));
    const pool=alive.filter(e=>e.row===br);
    if(pool.length){
      const s=pool[Math.floor(Math.random()*pool.length)];
      const a=(Math.random()-0.5)*0.4;
      const el=document.createElement('div');
      el.className='ebullet';
      el.style.left=(s.rx+29-7)+'px';el.style.top=(s.ry+58-7)+'px';
      game.appendChild(el);
      ebullets.push({x:s.rx+29,y:s.ry+58,vx:Math.sin(a)*2,vy:3.5+level*0.3,el});
    }
  }

  // Bullets vs enemies
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    const bx=b.x,by=b.y;
    for(const e of alive){
      if(bx>e.rx&&bx<e.rx+58&&by>e.ry&&by<e.ry+58){
        e.alive=false;e.el.style.display='none';
        b.el.remove();bullets.splice(bi,1);
        score+=(e.row+1)*10;
        document.getElementById('sc').textContent=score;
        spawnInk(e.rx+29,e.ry+29);playSplat();break;
      }
    }
  }

  // Enemy bullets vs player
  const pl=px-22,pt=GH-65-44,pr2=px+22,pb=GH-65;
  for(let i=ebullets.length-1;i>=0;i--){
    const b=ebullets[i];
    if(b.x>pl&&b.x<pr2&&b.y>pt&&b.y<pb){
      b.el.remove();ebullets.splice(i,1);lives--;
      playDeath();
      document.getElementById('lv').textContent='♥'.repeat(Math.max(0,lives));
      spawnInk(px,GH-65-22);
      if(lives<=0)gameOver();
      break;
    }
  }

  // Enemies reach bottom
  for(const e of alive){
    if(e.ry+58>=GH-65-10){lives=0;gameOver();break;}
  }

  if(lFlash>0){
    lFlash-=0.025;
    const lf=document.getElementById('levelFlash');
    document.getElementById('lfText').textContent='LEVEL '+level;
    lf.style.opacity=Math.min(1,lFlash*0.8);
  }else{
    document.getElementById('levelFlash').style.opacity=0;
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(){
  if(state!=='playing')return;
  raf=requestAnimationFrame(loop);
  gt+=0.016;
  update();
  updatePlayerDOM();
  updateParticles();
  drawStars(gt);
}
</script>
